<template>
    <section class="contact-section">
        <!-- Background Image (Optional, configured in Experience Builder) -->
        <template if:true={connectBgImage}>
            <img src={connectBgImage} alt="Section Background" class="connect-bg-image" />
        </template>
        
        <div class="section-inner contact-container-overlay">
            <div class="contact-grid">
                
                <!-- LEFT COLUMN: Heading, Desc, Button -->
                <div class="contact-left">
                    <div class="eyebrow-line"></div>
                    <h2 class="contact-heading">{sectionHeader}</h2>
                    <p class="contact-desc">{sectionDesc}</p>
                    
                    <a href={emailMailto} class="contact-btn">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <span>{contactButtonText}</span>
                    </a>
                </div>

                <!-- RIGHT COLUMN: Optional Illustration -->
                <div class="contact-right">
                    <template if:true={illustrationUrl}>
                        <img src={illustrationUrl} alt="Contact Illustration" class="illustration-img" />
                    </template>
                </div>

            </div>

            <!-- BOTTOM FOOTER ROW: Quick Contacts -->
            <div class="contact-footer-row">
                <!-- Email -->
                <a href={emailMailto} class="footer-item">
                    <svg class="footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <span class="footer-text">{emailAddress}</span>
                </a>

                <!-- Phone -->
                <a href={phoneTel} class="footer-item">
                    <svg class="footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                    </svg>
                    <span class="footer-text">{phoneNumber}</span>
                </a>

                <!-- Location -->
                <div class="footer-item">
                    <svg class="footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span class="footer-text">{locationText}</span>
                </div>
            </div>
        </div>
    </section>
</template>
