<template>
    <section class="projects-section">
        <div class="section-inner">
            <!-- SECTION HEADER -->
            <div class="projects-header">
                <div class="header-left">
                    <span class="eyebrow-text">{sectionLabel}</span>
                    <div class="eyebrow-line"></div>
                </div>
                <a href={viewAllProjectsUrl} class="view-all-link" target="_blank" rel="noopener">
                    <span>{viewAllLabel}</span>
                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </a>
            </div>

            <!-- PROJECTS GRID (3 Columns) -->
            <div class="projects-grid">
                
                <!-- Card 1: Project 1 -->
                <div class="project-card">
                    <div class="image-container">
                        <template if:true={project1ImageUrl}>
                            <img src={project1ImageUrl} alt={project1Title} class="project-image" />
                        </template>
                        <template if:false={project1ImageUrl}>
                            <div class="image-placeholder">
                                <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                    <circle cx="8.5" cy="8.5" r="1.5" />
                                    <polyline points="21 15 16 10 5 21" />
                                </svg>
                            </div>
                        </template>
                    </div>
                    <div class="card-body">
                        <span class="type-badge">{project1Type}</span>
                        <h3 class="card-title">{project1Title}</h3>
                        <p class="card-desc">
                            {project1Desc}
                        </p>
                        <div class="tech-pills">
                            <template for:each={project1TechList} for:item="tech">
                                <span key={tech} class="tech-pill">{tech}</span>
                            </template>
                        </div>
                        <a href={project1Url} class="card-action-link" target="_blank" rel="noopener">
                            <span>{project1LinkText}</span>
                            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </a>
                    </div>
                </div>

                <!-- Card 2: Project 2 -->
                <div class="project-card">
                    <div class="image-container">
                        <template if:true={project2ImageUrl}>
                            <img src={project2ImageUrl} alt={project2Title} class="project-image" />
                        </template>
                        <template if:false={project2ImageUrl}>
                            <div class="image-placeholder">
                                <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                    <circle cx="8.5" cy="8.5" r="1.5" />
                                    <polyline points="21 15 16 10 5 21" />
                                </svg>
                            </div>
                        </template>
                    </div>
                    <div class="card-body">
                        <span class="type-badge">{project2Type}</span>
                        <h3 class="card-title">{project2Title}</h3>
                        <p class="card-desc">
                            {project2Desc}
                        </p>
                        <div class="tech-pills">
                            <template for:each={project2TechList} for:item="tech">
                                <span key={tech} class="tech-pill">{tech}</span>
                            </template>
                        </div>
                        <a href={project2Url} class="card-action-link" target="_blank" rel="noopener">
                            <span>{project2LinkText}</span>
                            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </a>
                    </div>
                </div>

                <!-- Card 3: Project 3 -->
                <div class="project-card">
                    <div class="image-container">
                        <template if:true={project3ImageUrl}>
                            <img src={project3ImageUrl} alt={project3Title} class="project-image" />
                        </template>
                        <template if:false={project3ImageUrl}>
                            <div class="image-placeholder">
                                <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                    <circle cx="8.5" cy="8.5" r="1.5" />
                                    <polyline points="21 15 16 10 5 21" />
                                </svg>
                            </div>
                        </template>
                    </div>
                    <div class="card-body">
                        <span class="type-badge">{project3Type}</span>
                        <h3 class="card-title">{project3Title}</h3>
                        <p class="card-desc">
                            {project3Desc}
                        </p>
                        <div class="tech-pills">
                            <template for:each={project3TechList} for:item="tech">
                                <span key={tech} class="tech-pill">{tech}</span>
                            </template>
                        </div>
                        <a href={project3Url} class="card-action-link" target="_blank" rel="noopener">
                            <span>{project3LinkText}</span>
                            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </section>
</template>
