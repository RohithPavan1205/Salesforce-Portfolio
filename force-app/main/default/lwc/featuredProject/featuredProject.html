<template>
    <section class="project-section">
        <div class="section-inner">
            <!-- SECTION HEADER -->
            <div class="project-header">
                <span class="eyebrow-text">{sectionLabel}</span>
                <div class="eyebrow-line"></div>
            </div>

            <!-- TWO COLUMN LAYOUT -->
            <div class="project-grid">
                
                <!-- LEFT COLUMN: Mockup & Tech Stack -->
                <div class="project-left">
                    <div class="mockup-container">
                        <!-- Image Container -->
                        <div class="image-wrapper">
                            <template if:true={projectImageUrl}>
                                <img src={projectImageUrl} alt={projectTitle} class="mockup-image" />
                            </template>
                            <template if:false={projectImageUrl}>
                                <div class="image-placeholder">
                                    <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                        <circle cx="8.5" cy="8.5" r="1.5" />
                                        <polyline points="21 15 16 10 5 21" />
                                    </svg>
                                    <span class="placeholder-text">Project Screenshot Placeholder</span>
                                </div>
                            </template>
                        </div>
                        
                        <!-- Tech Stack Bar -->
                        <div class="tech-stack-bar">
                            <span class="tech-label">Tech Stack:</span>
                            <div class="tech-pills">
                                <template for:each={techStackList} for:item="tech">
                                    <span key={tech} class="tech-pill">{tech}</span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT COLUMN: Details & Action -->
                <div class="project-right">
                    <!-- Type Badge -->
                    <span class="type-badge">{projectType}</span>

                    <!-- Project Title -->
                    <h2 class="project-title">{projectTitle}</h2>

                    <!-- Project Description -->
                    <p class="project-description">
                        {projectDescription}
                    </p>

                    <!-- Feature Grid -->
                    <div class="features-grid">
                        <div class="feature-card">
                            <div class="feature-icon-wrapper">
                                <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                                </svg>
                            </div>
                            <span class="feature-text">{feature1}</span>
                        </div>

                        <div class="feature-card">
                            <div class="feature-icon-wrapper">
                                <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="16 18 22 12 16 6"></polyline>
                                    <polyline points="8 6 2 12 8 18"></polyline>
                                </svg>
                            </div>
                            <span class="feature-text">{feature2}</span>
                        </div>

                        <div class="feature-card">
                            <div class="feature-icon-wrapper">
                                <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="20" x2="18" y2="10"></line>
                                    <line x1="12" y1="20" x2="12" y2="4"></line>
                                    <line x1="6" y1="20" x2="6" y2="14"></line>
                                </svg>
                            </div>
                            <span class="feature-text">{feature3}</span>
                        </div>

                        <div class="feature-card">
                            <div class="feature-icon-wrapper">
                                <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                                </svg>
                            </div>
                            <span class="feature-text">{feature4}</span>
                        </div>
                    </div>

                    <!-- Impact Section -->
                    <div class="impact-section">
                        <h4 class="impact-heading">{impactHeading}</h4>
                        <p class="impact-text">
                            {impactText}
                        </p>
                    </div>

                    <!-- Action Buttons -->
                    <div class="btn-group">
                        <a href={caseStudyUrl} class="btn-primary" target="_blank" rel="noopener">
                            <span>{caseStudyLabel}</span>
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <line x1="10" y1="14" x2="21" y2="3"></line>
                            </svg>
                        </a>
                        <a href={liveDemoUrl} class="btn-secondary" target="_blank" rel="noopener">
                            <span>{liveDemoLabel}</span>
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </section>
</template>
